<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Playbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/player.css">
</head>
<body class="player-body">

  <!-- Position Picker (first visit) -->
  <div id="position-picker" class="position-picker hidden">
    <div class="picker-card">
      <div class="picker-brand">9V9 Football Hub</div>
      <h1 class="picker-title">What's your position?</h1>
      <p class="picker-sub">We'll highlight your assignments in every play.</p>
      <div class="picker-grid" id="picker-grid"></div>
      <p class="picker-note">You can change this any time from the menu.</p>
    </div>
  </div>

  <!-- Player App -->
  <div id="player-app" class="player-app hidden">
    <header class="player-header">
      <div class="player-brand">📋 Playbook</div>
      <div class="player-pos-badge" id="player-pos-badge"></div>
      <button class="btn btn--ghost btn--sm" id="change-pos-btn">Change Position</button>
    </header>

    <nav class="player-nav">
      <button class="player-nav-btn active" data-tab="playbook">Playbook</button>
      <button class="player-nav-btn" data-tab="game-plan">Game Plan</button>
    </nav>

    <main class="player-main" id="player-main">
      <div class="loading-line"></div>
    </main>
  </div>

  <script type="module" src="js/player.js"></script>
</body>
</html>
